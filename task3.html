<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
    }

    .quiz-container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    .question {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .options button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #5b86e5;
      color: white;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .options button:hover {
      background: #3559a3;
    }

    .next-btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #36d1dc;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: none;
      transition: 0.3s;
    }

    .next-btn:hover {
      background: #2ba5aa;
    }

    .result {
      font-size: 1.2em;
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quiz-container">
    <h1>🎯 Quiz App</h1>
    <div class="question" id="question">Loading...</div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    const quizData = [
      {
        question: "Which language is used for web development?",
        options: ["Python", "C++", "JavaScript", "Java"],
        answer: "JavaScript"
      },
      {
        question: "HTML stands for?",
        options: ["Hyper Trainer Marking Language", "Hyper Text Markup Language", "High Text Making Language", "Hyper Tabular Markup Language"],
        answer: "Hyper Text Markup Language"
      },
      {
        question: "Which CSS property is used to change text color?",
        options: ["background-color", "font-style", "color", "text-align"],
        answer: "color"
      },
      {
        question: "What does DOM stand for?",
        options: ["Document Object Model", "Data Object Method", "Digital Ordinance Model", "Desktop Oriented Mode"],
        answer: "Document Object Model"
      },
      {
        question: "Which tag is used for inserting an image in HTML?",
        options: ["<link>", "<img>", "<src>", "<picture>"],
        answer: "<img>"
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    function loadQuestion() {
      const q = quizData[currentQuestion];
      document.getElementById("question").innerText = q.question;
      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt, q.answer);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct) {
      if (selected === correct) {
        score++;
      }
      document.getElementById("nextBtn").style.display = "block";
      Array.from(document.getElementById("options").children).forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correct) {
          btn.style.background = "#28a745"; // correct
        } else if (btn.innerText === selected) {
          btn.style.background = "#dc3545"; // wrong
        }
      });
    }

    function nextQuestion() {
      currentQuestion++;
      document.getElementById("nextBtn").style.display = "none";

      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        document.getElementById("quiz-container").innerHTML =
          `<h1>Quiz Completed 🎉</h1>
           <p class="result">Your Score: ${score} / ${quizData.length}</p>`;
      }
    }

    loadQuestion();
  </script>
</body>
</html>
